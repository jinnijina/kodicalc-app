name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system packages
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk \
          autoconf automake libtool pkg-config \
          libffi-dev libssl-dev \
          aidl libstdc++6 python3-pip build-essential \
          libncurses5-dev zlib1g-dev \
          gettext libltdl-dev # Added these for Libtool macro support


    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        # Cython 0.29.33 is often the most stable for Kivy builds
        pip install "cython<3.0.0" buildozer 

    - name: Build APK
      run: |
        # We skip 'android update' because 'android debug' 
        # handles it if accept_sdk_license=True is in buildozer.spec
        buildozer -v android debug
      env:
        # This helps bypass some interactive prompts
        APP_ANDROID_ACCEPT_SDK_LICENSE: "True"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-kivymd-app
        # Buildozer puts the final apk in the bin/ folder
        path: bin/*.apk
